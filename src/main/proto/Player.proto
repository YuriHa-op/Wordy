syntax = "proto3";

import "Common.proto";

option java_multiple_files = true;

package wordy;

//player serve
service PlayerService {
  rpc Login(wordy.LoginRequest) returns (wordy.LoginResponse);
  rpc Logout(wordy.LogoutRequest) returns (wordy.LogoutResponse);
  rpc JoinGame(JoinGameRequest) returns (JoinGameResponse);
  rpc PollGameState(GameStateRequest) returns (GameStateResponse);
  rpc SubmitWord(SubmitWordRequest) returns (SubmitWordResponse);
  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse);
}

// player messages

message JoinGameRequest {
  string session_token = 1;
}

message JoinGameResponse {
  bool success = 1;
  string message = 2;
  string status = 3;      // "WAITING" or "MATCHED"
  int32 game_id = 4;
}

message GameStateRequest {//need token?
  int32 game_id = 1;
}

message GameStateResponse {
  bool success = 1;
  string message = 2;
  string status = 3;            // waiting, playing, round over , game over
  repeated string letters = 4;
  int32 time_remaining = 5;
  repeated PlayerScore players = 6;
  string round_winner = 7;
  string game_winner = 8;
  int32 round_number = 9;
}

message PlayerScore {
  string username = 1;
  int32 round_wins = 2;
  bool submitted_this_round = 3; //ng word
}

message SubmitWordRequest {//
  int32 game_id = 1;
  string word = 2;
  int32 round_number = 3;
}

message SubmitWordResponse {
  bool success = 1;
  string message = 2;
}
