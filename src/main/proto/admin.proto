syntax = "proto3";
package wordy;

import "common.proto";

option java_multiple_files = true;
option java_package = "com.wordy.grpc";
option java_outer_classname = "AdminProto";

message CreatePlayerRequest {
  string session_token = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}

message CreatePlayerResponse {
  bool success = 1;
  string message = 2;
}

message ReadPlayerRequest {
  string session_token = 1;
  int32 user_id = 2;
}

message ReadPlayerResponse {
  bool success = 1;
  string message = 2;
  int32 user_id = 3;
  string username = 4;
  string role = 5;
  int32 total_wins = 6;
}

message UpdatePlayerRequest {
  string session_token = 1;
  int32 user_id = 2;
  string password = 3;
  string role = 4;
  string username = 5;
  int32 total_wins = 6;
}

message UpdatePlayerResponse {
  bool success = 1;
  string message = 2;
}

message DeletePlayerRequest {
  string session_token = 1;
  int32 user_id = 2;
}

message DeletePlayerResponse {
  bool success = 1;
  string message = 2;
}

message SearchPlayerRequest {
  string session_token = 1;
  string keyword = 2;
}

message SearchPlayerResponse {
  bool success = 1;
  string message = 2;
  repeated ReadPlayerResponse players = 3;
}

message GetConfigRequest {
  string session_token = 1;
}

message ConfigItem {
  string key = 1;
  int32 value = 2;
}

message GetConfigResponse {
  bool success = 1;
  string message = 2;
  repeated ConfigItem configs = 3;
}

message UpdateConfigRequest {
  string session_token = 1;
  string key = 2;
  int32 value = 3;
}

message UpdateConfigResponse {
  bool success = 1;
  string message = 2;
}

service AdminService {
  rpc CreatePlayer(CreatePlayerRequest) returns (CreatePlayerResponse);
  rpc ReadPlayer(ReadPlayerRequest) returns (ReadPlayerResponse);
  rpc UpdatePlayer(UpdatePlayerRequest) returns (UpdatePlayerResponse);
  rpc DeletePlayer(DeletePlayerRequest) returns (DeletePlayerResponse);
  rpc SearchPlayer(SearchPlayerRequest) returns (SearchPlayerResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
}
